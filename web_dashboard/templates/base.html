<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Trading AI Dashboard{% endblock %}</title>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
          darkMode: 'class',
          theme: {
            extend: {
              colors: {
                background: "#020617",
                foreground: "#f8fafc",
                primary: "#0f172a",
                secondary: "#1e293b",
                muted: "#1a1e2f",
                border: "#334155",
                accent: "#22c55e",
                destructive: "#ef4444",
              },
              fontFamily: {
                sans: ['Inter', 'sans-serif'],
              }
            }
          }
        }
    </script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Marked & DOMPurify -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #f8fafc; }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-sidebar { background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(12px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-card { background: linear-gradient(145deg, rgba(30, 41, 59, 0.7), rgba(15, 23, 42, 0.9)); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-card:hover { border-color: rgba(34, 197, 94, 0.3); transition: border-color 0.3s ease; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }
        
        /* Typography overrides */
        h1, h2, h3, h4, h5, h6 { letter-spacing: -0.02em; }
        
        /* Hide details marker */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="antialiased selection:bg-accent selection:text-background min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="glass fixed w-full z-50 top-0 start-0 h-16 flex items-center justify-between px-6">
        <a href="/" class="flex items-center gap-2 text-lg font-semibold text-white tracking-tight hover:text-accent transition-colors">
            <i data-lucide="bot" class="text-accent w-6 h-6"></i>
            Trading-AI
        </a>
        <div class="flex items-center gap-3 text-sm font-medium text-slate-300">
            <i data-lucide="user-circle" class="w-5 h-5"></i>
            {{ username }}
        </div>
    </nav>

    <div class="flex flex-1 pt-16 h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="glass-sidebar w-64 flex-shrink-0 hidden md:flex flex-col h-full overflow-y-auto py-6 px-4">
            <div class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-4 px-3">Menu Principal</div>
            <nav class="flex flex-col gap-1">
                <a href="/" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 {% if request.url.path == '/' %}bg-accent/10 text-accent font-medium border border-accent/20{% else %}text-slate-400 hover:text-white hover:bg-white/5 border border-transparent{% endif %}">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <a href="/positions" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 {% if '/positions' in request.url.path %}bg-accent/10 text-accent font-medium border border-accent/20{% else %}text-slate-400 hover:text-white hover:bg-white/5 border border-transparent{% endif %}">
                    <i data-lucide="wallet" class="w-5 h-5"></i> Positions
                </a>
                <a href="/reports" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 {% if '/reports' in request.url.path %}bg-accent/10 text-accent font-medium border border-accent/20{% else %}text-slate-400 hover:text-white hover:bg-white/5 border border-transparent{% endif %}">
                    <i data-lucide="file-text" class="w-5 h-5"></i> Rapports
                </a>
                <a href="/performance" class="flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all duration-200 {% if '/performance' in request.url.path %}bg-accent/10 text-accent font-medium border border-accent/20{% else %}text-slate-400 hover:text-white hover:bg-white/5 border border-transparent{% endif %}">
                    <i data-lucide="trending-up" class="w-5 h-5"></i> Performances
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto p-6 md:p-8 bg-background relative">
            <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-primary/20 via-background to-background pointer-events-none"></div>
            <div class="max-w-7xl mx-auto relative z-10">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
